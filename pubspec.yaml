name: gisila_studio
description: >-
  Web-based admin interface for gisila models, inspired by Django admin.
  Auto-generates CRUD UI from TableMeta registrations, served over Shelf.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.3.3

dependencies:
  gisila_orm:
    path: ../gisila_orm
  shelf: ^1.4.1
  shelf_router: ^1.1.4

dev_dependencies:
  lints: ">=3.0.0 <7.0.0"
  test: ^1.24.0
